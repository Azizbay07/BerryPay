<!doctype html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#050816">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>BerryPay 9.0 Pro</title>
<link rel="manifest" href="manifest.json?v=90">
<link rel="apple-touch-icon" href="icon-192.png?v=90">
<link rel="stylesheet" href="style.css?v=90">
</head>
<body>
<div id="lock" class="lock show">
  <div class="lockBox">
    <div class="appIcon">B</div>
    <h1>BerryPay Pro</h1>
    <p id="pinTitle">Создай PIN</p>
    <div class="dots"><i></i><i></i><i></i><i></i></div>
    <div class="keys">
      <button onclick="pin('1')">1</button><button onclick="pin('2')">2</button><button onclick="pin('3')">3</button>
      <button onclick="pin('4')">4</button><button onclick="pin('5')">5</button><button onclick="pin('6')">6</button>
      <button onclick="pin('7')">7</button><button onclick="pin('8')">8</button><button onclick="pin('9')">9</button>
      <button onclick="resetPin()">Reset</button><button onclick="pin('0')">0</button><button onclick="backPin()">⌫</button>
    </div>
    <button class="face" onclick="unlock()">🔐 Face ID / Quick unlock</button>
  </div>
</div>
<div id="toast"></div>
<main class="app">
<header>
  <div class="brand"><div class="appIcon small">B</div><div><h1>BerryPay</h1><p>Version 9.0 · Azizbay 🍓</p></div></div>
  <button id="langBtn" onclick="changeLang()">RU</button>
</header>

<section id="home" class="page">
  <div class="premiumCard mainPay">
    <div class="topLine"><span data-t="nextPay">Ожидает выплаты</span><b>9.0 Pro</b></div>
    <h2 id="pendingPay">£0.00</h2><p id="pendingRange">—</p><p id="pendingDate">—</p>
  </div>
  <div class="premiumCard darkPay"><span data-t="currentWeek">Текущая неделя</span><h2 id="weekMoney">£0.00</h2><p id="weekRange">—</p></div>
  <div class="card"><h3>🍓 <span data-t="today">Сегодня</span></h3><div class="statsGrid" id="todayBox"></div></div>
  <div class="card">
    <h3 data-t="addShift">Добавить смену</h3>
    <label data-t="date">Дата</label><input id="date" type="date">
    <div class="two"><div><label data-t="field">Поле</label><input id="fieldName" type="text" placeholder="Block 4 / Pond 1"></div><div><label data-t="supervisor">Вайзер</label><input id="supervisor" type="text" placeholder="John"></div></div>
    <div class="two"><div><label data-t="start">Начало</label><input id="start" type="time" value="05:00"></div><div><label data-t="end">Конец</label><input id="end" type="time" value="17:00"></div></div>
    <div class="two"><div><label data-t="standard">Стандарт</label><input id="standard" type="number" oninput="autoKg()" placeholder="0"></div><div><label data-t="rubbish">Рабиш</label><input id="rubbish" type="number" oninput="autoKg()" placeholder="0"></div></div>
    <label data-t="kg">Килограммы</label><input id="kg" type="number" placeholder="0">
    <label data-t="note">Заметка</label><input id="note" type="text" placeholder="...">
    <button class="ghost" onclick="preview()" data-t="calculate">Рассчитать</button>
    <button class="primary" onclick="saveDay()" data-t="save">Сохранить</button>
    <div class="statsGrid" id="previewBox"></div>
  </div>
</section>

<section id="week" class="page hidden"><div class="card"><h3 data-t="calendar">Календарь</h3><div class="calendar" id="calendar"></div></div><div class="card"><h3 data-t="days">Дни</h3><div id="weekList"></div></div></section>
<section id="history" class="page hidden"><div class="card"><h3 data-t="history">История</h3><div id="historyList"></div></div></section>
<section id="stats" class="page hidden"><div class="card"><h3 data-t="stats">Статистика</h3><div class="statsGrid" id="statsBox"></div></div></section>
<section id="proof" class="page hidden"><div class="card"><h3 data-t="proof">Проверка зарплаты</h3><label data-t="paidAmount">Сколько пришло?</label><input id="paidAmount" type="number" placeholder="750"><button class="primary" onclick="checkPay()" data-t="check">Проверить</button><div id="proofResult"></div></div></section>
<section id="settings" class="page hidden"><div class="card"><h3 data-t="settings">Настройки</h3><label data-t="rate">Ставка £/час</label><input id="rate" type="number" step="0.01" value="12.71"><label data-t="ot">Овертайм £/час</label><input id="otRate" type="number" step="0.01" value="19.07"><label data-t="norm">Норма кг</label><input id="normKg" type="number" step="0.1" value="48"><label data-t="bonus">Бонус за кг £</label><input id="bonusKg" type="number" step="0.01" value="0.75"><label data-t="standardWeight">Вес стандарта</label><input id="standardKg" type="number" step="0.1" value="1.5"><label data-t="rubbishWeight">Вес рабиш</label><input id="rubbishKg" type="number" step="0.1" value="4"><button class="primary" onclick="saveSettings()" data-t="saveSettings">Сохранить настройки</button><button class="ghost" onclick="exportCSV()" data-t="downloadCsv">Скачать CSV</button><button class="ghost" onclick="resetPin()" data-t="changePin">Сменить PIN</button><button class="danger" onclick="clearAll()" data-t="clear">Очистить данные</button></div></section>
</main>
<nav>
<button class="active" onclick="tab('home',this)">⌂<span data-t="navHome">Главная</span></button><button onclick="tab('week',this)">□<span data-t="navWeek">Неделя</span></button><button onclick="tab('history',this)">↺<span data-t="navHistory">История</span></button><button onclick="tab('stats',this)">◌<span data-t="navStats">Стат.</span></button><button onclick="tab('proof',this)">£<span data-t="navProof">Проверка</span></button><button onclick="tab('settings',this)">⚙<span data-t="navSettings">Настройки</span></button>
</nav>
<script src="app.js?v=90"></script>
</body></html>
